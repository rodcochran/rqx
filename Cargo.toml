# Cargo.toml
[package]
name = "reqx-core"
version = "0.1.0"
edition = "2024"

[lib]
name = "_reqx"
crate-type = ["cdylib"]

[dependencies]
http = "1.4.0"
pyo3 = { version = "0.27.0", features = ["extension-module"] }
reqwest = { version = "0.13.2", features = ["json"] }
serde = "1.0.228"
serde_json = "1.0.149"
tokio = { version = "1.51.0", features = ["macros", "rt-multi-thread"] }
