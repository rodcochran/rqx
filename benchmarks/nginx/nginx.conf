worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;

        # Three payload sizes served as static files. Exact-match locations
        # so each URL maps to a single response without falling through.
        location = /json {
            default_type application/json;
            alias /usr/share/nginx/html/response.json;
        }
        location = /json/10kb {
            default_type application/json;
            alias /usr/share/nginx/html/response-10kb.json;
        }
        location = /json/100kb {
            default_type application/json;
            alias /usr/share/nginx/html/response-100kb.json;
        }
    }
}
