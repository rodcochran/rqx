# Host-native nginx config for the large-payload benchmark.
#
# Used to escape Docker Desktop's virtio networking ceiling (~200 MB/s on
# macOS) which caps Docker-backed benches at payload sizes >= 100 KB. This
# runs nginx directly on the host so localhost traffic never traverses the
# VM boundary.
#
# Launch with:
#     nginx -p $PWD/benchmarks/nginx -c nginx-host.conf
#
# Stop with:
#     nginx -p $PWD/benchmarks/nginx -c nginx-host.conf -s quit
#
# Separate pid / error_log paths so it doesn't collide with any other
# nginx instance on the machine. Listens on :8082 to stay out of the way
# of the Docker nginx on :8080 and the delay server on :8081.

worker_processes auto;
# Put pid in the working dir so brew's default /opt/homebrew/var/run is
# left alone. `nginx -p <dir>` sets the working dir; relative paths here
# resolve against it.
pid logs/nginx-host.pid;
error_log logs/nginx-host.error.log warn;

events {
    worker_connections 4096;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Large payload sizes will push more bytes per response — raise
    # buffers so nginx doesn't swap to disk on the 1 MB responses.
    output_buffers 2 64k;

    server {
        listen 127.0.0.1:8082;

        # The response files live alongside this config file. `nginx -p`
        # will set the working dir to benchmarks/nginx/, so relative
        # aliases resolve into it.
        location = /json {
            default_type application/json;
            alias response.json;
        }
        location = /json/10kb {
            default_type application/json;
            alias response-10kb.json;
        }
        location = /json/100kb {
            default_type application/json;
            alias response-100kb.json;
        }
        location = /json/1mb {
            default_type application/json;
            alias response-1mb.json;
        }
    }

    # HTTPS server for the TLS handshake benchmark (b10).
    #
    # `keepalive_timeout 0` forces a fresh TCP + TLS handshake per request,
    # which is what isolates "handshake throughput" from "HTTP-over-warm-
    # socket throughput". With keepalive enabled this bench would largely
    # replay b9 numbers because only the first request per worker pays the
    # handshake cost.
    #
    # Self-signed cert under certs/ (see certs/README or regenerate with
    # `openssl req -x509 -newkey rsa:2048 -keyout certs/server.key
    #  -out certs/server.crt -days 30 -nodes -subj "/CN=localhost"`).
    # Clients must pass `verify=False` (or equivalent) to accept it.
    server {
        listen 127.0.0.1:8443 ssl;
        ssl_certificate certs/server.crt;
        ssl_certificate_key certs/server.key;
        keepalive_timeout 0;

        location = /json {
            default_type application/json;
            alias response.json;
        }
    }
}
