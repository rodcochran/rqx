# Loopback-only static server for the streaming A/B.
#
# Tuned to get out of the way: the point of this bench is the client's
# per-chunk CPU cost, so nginx must never be the bottleneck or a source of
# variance between arms.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;
daemon on;

events {
    worker_connections 4096;
}

http {
    access_log off;          # logging every request would add syscall noise
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    gzip off;                # wire bytes == body bytes; no codec in the path
    output_buffers 4 256k;   # large bodies shouldn't round-trip through disk

    server {
        listen 127.0.0.1:8080;
        default_type application/octet-stream;

        location = /8kb  { alias /srv/payloads/8kb.bin; }
        location = /1mb  { alias /srv/payloads/1mb.bin; }
        location = /10mb { alias /srv/payloads/10mb.bin; }
    }
}
